<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doorway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #F2F0EF;
      overflow-x: hidden;
    }

    /* ── Scroll sequence ── */
    #doorway-sequence {
      position: relative;
      height: 500vh;
      width: 100%;
      background: #F2F0EF;
    }

    #doorway-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    #doorway-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Fade-out overlay back to background colour */
    #doorway-reveal {
      position: absolute;
      inset: 0;
      background: #F2F0EF;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Content that appears after the animation ── */
    #after-content {
      position: relative;
      z-index: 2;
      background: #F2F0EF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
    }

    #after-content h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.02em;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="doorway-sequence">
    <div id="doorway-sticky">
      <canvas id="doorway-canvas"></canvas>
      <div id="doorway-reveal"></div>
    </div>
  </div>

  <!-- Replace this with whatever content follows your animation -->
  <div id="after-content">
    <h1>Your content goes here</h1>
  </div>

  <script>
    (function () {
      const section  = document.getElementById('doorway-sequence');
      const canvas   = document.getElementById('doorway-canvas');
      const reveal   = document.getElementById('doorway-reveal');
      const ctx      = canvas.getContext('2d');

      const frameCount = 37;
      const BASE_URL   = 'https://res.cloudinary.com/df94hakfq/image/upload/q_auto,f_auto,w_1600/samples/doorway/';

      const images = [];
      let currentIndex = 0;
      let started      = false;
      let rafPending   = false;

      /* ── Helpers ── */
      function frameUrl(i) {
        return BASE_URL + 'frame_' + String(i).padStart(3, '0') + '.jpg';
      }

      function clamp(min, max, v) {
        return Math.min(max, Math.max(min, v));
      }

      /* ── Canvas sizing ── */
      function setCanvasSize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        // reset transform so draws don't stack
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      /* ── Draw a frame ── */
      function draw(index) {
        const img = images[index];
        if (!img || !img.complete || !img.naturalWidth) return;

        const cw = canvas.width  / (window.devicePixelRatio <= 2 ? Math.min(window.devicePixelRatio, 2) : 1);
        const ch = canvas.height / (window.devicePixelRatio <= 2 ? Math.min(window.devicePixelRatio, 2) : 1);

        // Use CSS pixel dimensions for drawing (ctx is already scaled by dpr via setTransform)
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const iw = img.naturalWidth;
        const ih = img.naturalHeight;

        const scale = Math.max(vw / iw, vh / ih);
        const w = iw * scale;
        const h = ih * scale;
        const x = (vw - w) / 2;
        const y = (vh - h) / 2;

        ctx.clearRect(0, 0, vw, vh);
        ctx.drawImage(img, x, y, w, h);
      }

      /* ── Scroll progress (0 → 1) ── */
      function getProgress() {
        const scrollY = window.scrollY;
        const top     = section.offsetTop;
        const total   = section.offsetHeight - window.innerHeight;
        const passed  = clamp(0, total, scrollY - top);
        return total > 0 ? passed / total : 0;
      }

      /* ── Update on scroll ── */
      function update() {
        rafPending = false;
        if (!started) return;

        const progress = getProgress();

        // Frames play from 0 → 78% of scroll
        const index = Math.min(
          frameCount - 1,
          Math.round(clamp(0, 1, progress / 0.78) * (frameCount - 1))
        );
        currentIndex = index;
        draw(currentIndex);

        // Fade-to-background from 80% → 100% of scroll
        const revealProgress = clamp(0, 1, (progress - 0.80) / 0.20);
        reveal.style.opacity = revealProgress;
      }

      function onScroll() {
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(update);
        }
      }

      /* ── Load frames ── */
      function initImages() {
        let loaded = 0;
        for (let i = 1; i <= frameCount; i++) {
          const img = new Image();

          img.onload = function () {
            loaded++;
            // Start as soon as frame 1 is ready
            if (!started && loaded >= 1) {
              started = true;
              requestAnimationFrame(function () {
                setCanvasSize();
                draw(0);
                update();
              });
            }
          };

          img.onerror = function () {
            console.warn('Failed to load:', frameUrl(i));
          };

          img.src = frameUrl(i);
          images.push(img);
        }
      }

      /* ── Event listeners ── */
      window.addEventListener('scroll', onScroll, { passive: true });

      window.addEventListener('resize', function () {
        setCanvasSize();
        draw(currentIndex);
        update();
      });

      /* ── Kick off ── */
      setCanvasSize();
      initImages();
    })();
  </script>

</body>
</html>
