<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doorway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #F2F0EF;
      overflow: hidden;
    }

    #doorway-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #F2F0EF;
    }

    #doorway-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Fade-in overlay that reveals a white/bg flush at the end */
    #doorway-reveal {
      position: absolute;
      inset: 0;
      background: #F2F0EF;
      opacity: 0;
      pointer-events: none;
      transition: none;
    }

    /* Loading indicator */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F2F0EF;
      z-index: 10;
    }

    #loading-bar-wrap {
      width: 180px;
      height: 2px;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: #1a1a1a;
      border-radius: 2px;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>

  <div id="doorway-wrap">
    <canvas id="doorway-canvas"></canvas>
    <div id="doorway-reveal"></div>
    <div id="loading">
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const wrap        = document.getElementById('doorway-wrap');
      const canvas      = document.getElementById('doorway-canvas');
      const reveal      = document.getElementById('doorway-reveal');
      const loading     = document.getElementById('loading');
      const loadingBar  = document.getElementById('loading-bar');
      const ctx         = canvas.getContext('2d');

      /* ─── Config ─────────────────────────────────── */
      const FRAME_COUNT   = 37;
      const BASE_URL      = 'https://res.cloudinary.com/df94hakfq/image/upload/q_auto,f_auto,w_1600/samples/doorway/';
      const PLAY_DURATION = 2800;   // ms for full animation (increase to slow down)
      const REPLAY        = true;   // replay every time the section re-enters view

      /* ─── State ──────────────────────────────────── */
      const images      = [];
      let loadedCount   = 0;
      let isReady       = false;
      let isPlaying     = false;
      let playStart     = null;
      let rafId         = null;
      let hasPlayedOnce = false;

      /* ─── Canvas sizing ──────────────────────────── */
      function setCanvasSize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      /* ─── Draw a frame ───────────────────────────── */
      function draw(index) {
        const img = images[index];
        if (!img || !img.complete || !img.naturalWidth) return;

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const iw = img.naturalWidth;
        const ih = img.naturalHeight;
        const scale = Math.max(vw / iw, vh / ih);
        const w = iw * scale;
        const h = ih * scale;
        const x = (vw - w) / 2;
        const y = (vh - h) / 2;

        ctx.clearRect(0, 0, vw, vh);
        ctx.drawImage(img, x, y, w, h);
      }

      /* ─── Easing (ease-in-out cubic) ─────────────── */
      function easeInOut(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      /* ─── Play animation ─────────────────────────── */
      function playAnimation() {
        if (isPlaying) return;
        isPlaying = true;
        playStart = performance.now();

        function tick(now) {
          const elapsed  = now - playStart;
          const rawT     = Math.min(elapsed / PLAY_DURATION, 1);
          const t        = easeInOut(rawT);

          // Frames advance through first 90% of animation
          const frameT   = Math.min(t / 0.9, 1);
          const index    = Math.min(FRAME_COUNT - 1, Math.round(frameT * (FRAME_COUNT - 1)));
          draw(index);

          // Fade to background colour in the last 20%
          const fadeT    = Math.max(0, (t - 0.80) / 0.20);
          reveal.style.opacity = fadeT;

          if (rawT < 1) {
            rafId = requestAnimationFrame(tick);
          } else {
            isPlaying     = false;
            hasPlayedOnce = true;
          }
        }

        rafId = requestAnimationFrame(tick);
      }

      /* ─── Load frames ────────────────────────────── */
      function loadImages() {
        for (let i = 1; i <= FRAME_COUNT; i++) {
          const img = new Image();
          const url = BASE_URL + 'frame_' + String(i).padStart(3, '0') + '.jpg';

          img.onload = function () {
            loadedCount++;
            const pct = (loadedCount / FRAME_COUNT) * 100;
            loadingBar.style.width = pct + '%';

            // Show first frame as soon as it loads
            if (loadedCount === 1) {
              setCanvasSize();
              draw(0);
            }

            // Ready when enough frames are loaded to play smoothly (≥50%)
            if (!isReady && loadedCount >= Math.ceil(FRAME_COUNT * 0.5)) {
              isReady = true;
              loading.style.opacity = '0';
              loading.style.transition = 'opacity 0.4s';
              setTimeout(function () { loading.style.display = 'none'; }, 400);
              // If observer already fired before images were ready, play now
              if (shouldPlay) playAnimation();
            }
          };

          img.onerror = function () {
            console.warn('Could not load frame:', url);
            loadedCount++;
          };

          img.src = url;
          images.push(img);
        }
      }

      /* ─── IntersectionObserver ───────────────────── */
      let shouldPlay = false;

      const observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            // Reset reveal overlay so animation is visible
            reveal.style.opacity = 0;

            if (!REPLAY && hasPlayedOnce) return;

            shouldPlay = true;
            if (isReady) {
              // Small delay so user sees the first frame before zoom starts
              setTimeout(playAnimation, 300);
            }
          } else {
            // Cancel any in-progress play when scrolled away
            if (rafId) cancelAnimationFrame(rafId);
            isPlaying = false;
          }
        });
      }, { threshold: 0.4 }); // fires when 40% of the element is visible

      observer.observe(wrap);

      /* ─── Resize ─────────────────────────────────── */
      window.addEventListener('resize', function () {
        setCanvasSize();
        draw(0);
      });

      /* ─── Init ───────────────────────────────────── */
      setCanvasSize();
      loadImages();

    })();
  </script>

</body>
</html>
